name: Build Electron App

on:
  # Build automatically when a version tag is pushed
  push:
    tags:
      - 'v*'
  # Allow manual builds from the GitHub Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
            builder-args: --win
            artifacts: |
              electron-app/release/*.exe
          - os: macos-latest
            platform: mac
            builder-args: --mac
            artifacts: |
              electron-app/release/*.dmg
          - os: ubuntu-latest
            platform: linux
            builder-args: --linux
            artifacts: |
              electron-app/release/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install web project dependencies
        run: npm ci

      - name: Build web project
        run: npx vite build

      - name: Copy web build to electron-app
        run: |
          node -e "require('fs').cpSync('dist','electron-app/web-dist',{recursive:true})"

      - name: Install electron-app dependencies
        working-directory: electron-app
        run: npm ci

      - name: Compile Electron TypeScript
        working-directory: electron-app
        run: npx tsc

      # --publish never: the release job below uploads the installers;
      # otherwise electron-builder self-publishes on tag builds and the
      # release ends up with duplicate assets
      - name: Build installer
        working-directory: electron-app
        run: npx electron-builder ${{ matrix.builder-args }} --publish never
        env:
          # No Apple Developer certificate available; ship unsigned mac builds
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-installer
          path: ${{ matrix.artifacts }}
          retention-days: 30

  # Create a single GitHub Release with all platform installers when triggered by a tag
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            installers/*.exe
            installers/*.dmg
            installers/*.AppImage
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
